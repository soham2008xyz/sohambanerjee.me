<script type="text/javascript" src="{{ "/assets/js/index.js" | prepend: site.baseurl  }}"></script>
<script type="text/javascript">
  (function () {
    "use strict";

    // Disqus comment counts
    var disqus_shortname = 'sohambanerjee-me';

    function disqusCountsLoaded() {
      var widgets = window.DISQUSWIDGETS;
      if (!widgets) return;
      Array.prototype.forEach.call(document.querySelectorAll('.disqus-comment-count'), function (el) {
        if (el.textContent.trim() !== '') {
          var parent = el.closest('.disqus-count');
          if (parent) parent.style.display = 'inline-block';
        }
      });
    }

    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://' + disqus_shortname + '.disqus.com/count.js';
    s.onload = disqusCountsLoaded;
    document.head.appendChild(s);

    // Reading time: words/180 wpm, displayed when computed
    function countWords(text) {
      var matches = text.trim().match(/\S+/g);
      return matches ? matches.length : 0;
    }

    function fillReadingTime(content, wordsTarget, timeTarget) {
      if (!content) return false;
      var words = countWords(content.textContent);
      if (words === 0) return false;
      var minutes = Math.max(1, Math.round(words / 180));
      if (wordsTarget) wordsTarget.textContent = words.toLocaleString();
      if (timeTarget) timeTarget.textContent = minutes;
      return true;
    }

    function showReadingTime(scope) {
      var readingTime = scope.querySelector('.reading-time');
      var wordsTarget = scope.querySelector('.words, .post-word-count');
      var timeTarget = scope.querySelector('.eta, .post-reading-time');
      var localContent = scope.querySelector('.post-content');

      if (localContent) {
        if (fillReadingTime(localContent, wordsTarget, timeTarget)) {
          if (readingTime) readingTime.style.display = 'inline';
        } else if (readingTime) {
          readingTime.remove();
        }
        return;
      }

      // Homepage teasers only render a truncated excerpt locally, so fetch
      // the full post to compute an accurate word count/reading time.
      var permalink = scope.querySelector('[itemprop=url]');
      if (!permalink) {
        if (readingTime) readingTime.remove();
        return;
      }

      fetch(permalink.href)
        .then(function (response) { return response.text(); })
        .then(function (html) {
          var remoteContent = new DOMParser().parseFromString(html, 'text/html').querySelector('.post-content');
          if (fillReadingTime(remoteContent, wordsTarget, timeTarget)) {
            if (readingTime) readingTime.style.display = 'inline';
          } else if (readingTime) {
            readingTime.remove();
          }
        })
        .catch(function () {
          if (readingTime) readingTime.remove();
        });
    }

    function init() {
      if (window.homepage) {
        document.querySelectorAll('article').forEach(function (article) {
          showReadingTime(article);
        });
      }
      if (window.single_post) {
        showReadingTime(document);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
