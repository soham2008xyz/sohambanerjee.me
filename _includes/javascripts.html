<script type="text/javascript">
  (function () {
    "use strict";

    // Disqus comment counts
    var disqus_shortname = 'sohambanerjee-me';

    function disqusCountsLoaded() {
      var widgets = window.DISQUSWIDGETS;
      if (!widgets || !widgets.displayCount) return;
      // Disqus populates .disqus-comment-count asynchronously after this
      // script loads, so wrap displayCount to reveal counts once it actually
      // renders them rather than checking too early.
      var originalDisplayCount = widgets.displayCount;
      widgets.displayCount = function (arg) {
        originalDisplayCount(arg);
        Array.prototype.forEach.call(document.querySelectorAll('.disqus-comment-count'), function (el) {
          if (el.textContent.trim() !== '') {
            var parent = el.closest('.disqus-count');
            if (parent) parent.style.display = 'inline-block';
          }
        });
      };
    }

    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://' + disqus_shortname + '.disqus.com/count.js';
    s.onload = disqusCountsLoaded;
    document.head.appendChild(s);

    // Reading time: words/180 wpm, using a word count Jekyll renders into
    // data-word-count (homepage teasers only have a truncated excerpt in
    // the DOM, not the full post body, so it can't be computed client-side).
    function fillReadingTime(readingTime) {
      var words = parseInt(readingTime.getAttribute('data-word-count'), 10) || 0;
      if (words === 0) return false;
      var minutes = Math.max(1, Math.round(words / 180));
      var wordsTarget = readingTime.querySelector('.words, .post-word-count');
      var timeTarget = readingTime.querySelector('.eta, .post-reading-time');
      if (wordsTarget) wordsTarget.textContent = words.toLocaleString();
      if (timeTarget) timeTarget.textContent = minutes + ' min';
      return true;
    }

    function showReadingTime(scope) {
      var readingTime = scope.querySelector('.reading-time');
      if (!readingTime) return;
      if (fillReadingTime(readingTime)) {
        readingTime.style.display = 'inline';
      } else {
        readingTime.remove();
      }
    }

    function init() {
      if (window.homepage) {
        document.querySelectorAll('article').forEach(function (article) {
          showReadingTime(article);
        });
      }
      if (window.single_post) {
        showReadingTime(document);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
