name: Site Configuration / Improvement
description: Suggest a change to site layout, design, or configuration
title: "[Config]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for changes to site styling, layout, build config, or infrastructure.

  - type: textarea
    id: description
    attributes:
      label: What would you like to change?
      description: Describe the configuration or layout change.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why?
      description: What does this improve? (performance, UX, maintainability, etc.)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: false
      options:
        - Layout / Design
        - Performance / Build
        - SEO / Analytics
        - Accessibility
        - Dependencies / Tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: Suggested Implementation
      description: Any ideas on how to implement this change?
    validations:
      required: false

  - type: checkboxes
    id: contributing
    attributes:
      label: Contribution
      options:
        - label: I can help implement this change
